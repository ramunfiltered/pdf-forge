<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Forge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0e16;--s1:#181824;--s2:#20202e;--s3:#28283a;
  --bd:#30304a;--ac:#6c63ff;--acg:rgba(108,99,255,.2);
  --tx:#ddddf0;--mu:#686890;--red:#ff6060;--grn:#3dd68c
}
body{width:360px;background:var(--bg);color:var(--tx);font:13px/1.5 system-ui,sans-serif;user-select:none}

/* header */
.hdr{display:flex;align-items:center;gap:10px;padding:13px 14px 11px;
  background:linear-gradient(135deg,#141428,#0e0e16);border-bottom:1px solid var(--bd)}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--ac),#a78bfa);
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
  box-shadow:0 0 16px var(--acg)}
.hdr-t h1{font-size:14px;font-weight:700;color:#fff}
.hdr-t p{font-size:10px;color:var(--mu);margin-top:1px}

/* drop zone */
.dz{margin:12px;border:2px dashed var(--bd);border-radius:12px;
  padding:20px 12px;text-align:center;cursor:pointer;background:var(--s1);transition:.18s}
.dz:hover,.dz.on{border-color:var(--ac);background:var(--acg)}
.dz .ico{font-size:28px;margin-bottom:6px}
.dz h3{font-size:13px;font-weight:600}
.dz p{font-size:11px;color:var(--mu);margin-top:2px}
.br{display:inline-block;margin-top:9px;padding:5px 14px;background:var(--ac);
  color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.br:hover{background:#7b72ff}

/* file card */
.fc{margin:12px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:9px 12px;display:none;align-items:center;gap:9px}
.fc.show{display:flex}
.fc-ico{width:32px;height:32px;background:linear-gradient(135deg,#ff6060,#ff9040);
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.fc-info{flex:1;min-width:0}
.fc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-size{font-size:10px;color:var(--mu);margin-top:1px}
.fc-x{background:none;border:none;color:var(--mu);cursor:pointer;font-size:14px;padding:3px;border-radius:4px}
.fc-x:hover{color:var(--red)}

/* CTA */
.cta{display:flex;align-items:center;justify-content:center;gap:7px;
  margin:0 12px 4px;width:calc(100% - 24px);padding:11px;
  background:linear-gradient(135deg,var(--ac),#8b7fff);border:none;border-radius:10px;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px var(--acg);
  transition:.16s}
.cta:hover{transform:translateY(-1px);box-shadow:0 7px 24px var(--acg)}

/* section */
.sec{padding:9px 12px 5px;font-size:10px;font-weight:600;color:var(--mu);
  text-transform:uppercase;letter-spacing:.7px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px}
.tb{display:flex;align-items:center;gap:7px;padding:9px 9px;background:var(--s1);
  border:1px solid var(--bd);border-radius:10px;cursor:pointer;color:var(--tx);
  font:inherit;text-align:left;transition:.15s}
.tb:hover{border-color:var(--ac);background:var(--s2);transform:translateY(-1px)}
.tb .ti{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0}
.tb .tn{font-size:12px;font-weight:600}
.tb .td{font-size:10px;color:var(--mu)}
.i1{background:rgba(108,99,255,.2)}.i2{background:rgba(59,130,246,.2)}
.i3{background:rgba(74,222,128,.2)}.i4{background:rgba(251,146,60,.2)}
.i5{background:rgba(236,72,153,.2)}.i6{background:rgba(20,184,166,.2)}
.i7{background:rgba(250,204,21,.2)}.i8{background:rgba(255,107,107,.2)}

/* convert row */
.cvrow{display:flex;gap:5px;padding:0 12px}
.cv{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:8px;
  padding:7px 4px;text-align:center;cursor:pointer;font:11px/1.3 inherit;
  font-weight:500;color:var(--tx);transition:.14s}
.cv:hover{border-color:var(--ac);background:var(--s2)}
.cv span{display:block;font-size:14px;margin-bottom:2px}

.div{height:1px;background:var(--bd);margin:9px 12px}
.st{display:flex;align-items:center;gap:6px;padding:6px 12px 10px;font-size:11px;color:var(--mu)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--grn);
  box-shadow:0 0 5px var(--grn);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
#fi{display:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">📄</div>
  <div class="hdr-t"><h1>PDF Forge</h1><p>Editor · Converter · Toolkit</p></div>
</div>

<div class="dz" id="dz">
  <div class="ico">📁</div>
  <h3>Drop PDF here</h3>
  <p>or click to browse — up to 200MB</p>
  <button class="br" id="brBtn">Browse Files</button>
</div>
<input type="file" id="fi" accept=".pdf,application/pdf">

<div class="fc" id="fc">
  <div class="fc-ico">📄</div>
  <div class="fc-info">
    <div class="fc-name" id="fcName">—</div>
    <div class="fc-size" id="fcSize">—</div>
  </div>
  <button class="fc-x" id="fcX" title="Remove">✕</button>
</div>

<button class="cta" id="openBtn">✏️ &nbsp;Open in PDF Editor</button>

<div class="div"></div>
<div class="sec">PDF TOOLS</div>
<div class="grid">
  <button class="tb" data-tool="annotate"><div class="ti i5">✍️</div><div><div class="tn">Annotate</div><div class="td">Text & notes</div></div></button>
  <button class="tb" data-tool="draw">    <div class="ti i7">✏️</div><div><div class="tn">Draw</div><div class="td">Freehand</div></div></button>
  <button class="tb" data-tool="highlight"><div class="ti i4">🖊️</div><div><div class="tn">Highlight</div><div class="td">Mark text</div></div></button>
  <button class="tb" data-tool="shape">  <div class="ti i2">⬜</div><div><div class="tn">Shapes</div><div class="td">Rect / circle</div></div></button>
  <button class="tb" data-tool="compress"><div class="ti i3">🗜️</div><div><div class="tn">Compress</div><div class="td">Reduce size</div></div></button>
  <button class="tb" data-tool="rotate">  <div class="ti i1">🔄</div><div><div class="tn">Rotate</div><div class="td">Fix pages</div></div></button>
  <button class="tb" data-tool="watermark"><div class="ti i6">💧</div><div><div class="tn">Watermark</div><div class="td">Stamp PDF</div></div></button>
  <button class="tb" data-tool="extract"> <div class="ti i8">📤</div><div><div class="tn">Extract</div><div class="td">Save pages</div></div></button>
</div>

<div class="div"></div>
<div class="sec">CONVERT</div>
<div class="cvrow">
  <button class="cv" data-tool="merge">   <span>🔗</span>Merge</button>
  <button class="cv" data-tool="pdf2img"> <span>🖼️</span>→ Image</button>
  <button class="cv" data-tool="img2pdf"> <span>📄</span>→ PDF</button>
  <button class="cv" data-tool="extract"> <span>✂️</span>Split</button>
</div>

<div class="st"><div class="dot"></div>100% local — nothing uploaded</div>
<script src="popup.js"></script>
</body>
</html>
